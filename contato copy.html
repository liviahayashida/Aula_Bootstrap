<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<!-- data-bs-theme="dark" -->

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"> <i class="bi bi-house"></i></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre.html">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container-fluid mt-3">
        <h3>Contato</h3>
        <!-- Nome -->
        <form class="row g-3">
            <div class="col-md-7 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome Completo" required>
                    <label for="nome">Nome Completo</label>
                </div>
            </div>
            <!-- Email -->
            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="email" name="email" id="email" class="form-control" placeholder="E-mail" required>
                    <label for="email">E-mail</label>
                </div>
            </div>
            <!-- Numero do pedido -->
             <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="number" name="numero" id="numero" class="form-control" placeholder="Número">
                    <label for="numero">Número do pedido</label>
                </div>
            </div>
            <!-- Descrição -->
            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="descricao" id="descricao" class="form-control" placeholder="Descrição" required>
                    <label for="descricao">Descrição</label>
                </div>
            </div>
            <!-- Data -->
            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <input type="time" name="time" id="time" class="form-control" placeholder="">
                    <label for="time">Melhor horário para contato</label>
                </div>
            </div>
            <!--Select -->
            <div class="col-md-4 col-sm-12">
                <div class="form-floating">
                    <select name="categoria" id="categoria" class="form-select" required>
                        <option value="" selected disabled>Selecione o Assunto</option>
                        <option value="problemacompra">Problema com compra</option>
                        <option value="duvida">Dúvida</option>
                        <option value="reembolso">Reembolso</option>
                        <option value="suporte">Suporte Técnico</option>
                        <option value="outro">Outro</option>
                        <label for="categoria">Assunto</label>
                    </select>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <label class="form-label d-block">Como voce avalia nosso site?</label>
                <!-- primeira opção -->
                <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="1" class="form-check-input">
                    <label for="1" class="form-check-label">⭐</label>
                </div>
                <!-- segunda opção -->
                 <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="2" class="form-check-input">
                    <label for="2" class="form-check-label">⭐⭐</label>
                </div>
                <!-- terceira opção-->
                 <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="3" class="form-check-input">
                    <label for="3" class="form-check-label">⭐⭐⭐</label>
                </div>
                <!-- quarta opção -->
                 <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="4" class="form-check-input">
                    <label for="4" class="form-check-label">⭐⭐⭐⭐</label>
                </div>
                <!-- quianta opção -->
                 <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="5" class="form-check-input">
                    <label for="5" class="form-check-label">⭐⭐⭐⭐⭐</label>
                </div>
            </div>

            <div class="col-md-12 col-sm-12">
                <div class="form-check">
                    <input type="checkbox" name="termos" id="termos" class="form-check-input" required>
                    <label for="termos" class="form-check-label">Aceito os termos</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" name="notificacao" id="notificacao" class="form-check-input" required>
                    <label for="notificacao" class="form-check-label">Quero receber promoções e novidades</label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Enviar</button>
                <button type="reset" class="btn btn-warning">Limpar</button>
                <button type="button" class="btn btn-danger">Cancelar</button>
            </div>
        </form>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
