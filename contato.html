<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<!-- data-bs-theme="dark" -->

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html"> <i class="bi bi-house"></i></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sobre.html">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container-fluid mt-3">
        <h3>Contato</h3>
        <!-- Nome -->
        <form class="row g-3">
            <div class="col-md-7 col-sm-12">
                <div class="form-floating">
                    <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome Completo" required>
                    <label for="nome">Nome Completo</label>
                </div>
            </div>
            <!-- Valor do pedido -->
            <div class="col-md-5 col-sm-12">
                <div class="form-floating">
                    <input type="number" step="0.5" name="valor" id="valor" class="form-control" placeholder="Valor" required>
                    <label for="valor">Valor</label>
                </div>
            </div>
            <!-- Quantidade -->
             <div class="col-md-6 col-sm-12">
                <div class="form-floating">
                    <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="Quantidade">
                    <label for="quantidade">Quantidade</label>
                </div>
            </div>

            <!--Select -->
            <div class="col-md-6 col-sm-12">
                <div class="form-floating">
                    <select name="categoria" id="categoria" class="form-select" required>
                        <option value="" selected disabled>Categoria</option>
                        <option value="lancamentos">Lançamentos</option>
                        <option value="promocao">Promoção</option>
                        <option value="vendidos">Mais Vendidos</option>
                        <option value="destaques">Destaques</option>
                        <option value="prevenda">Pré-Venda</option>
                    </select>
                </div>
            </div>

            <div class="col-md-4 col-sm-12">
                <label class="form-label d-block">Fabricado em </label>
                <!-- sp -->
                <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="sp" class="form-check-input">
                    <label for="sp" class="form-check-label">São Paulo</label>
                </div>
                <!-- rj -->
                 <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="rj" class="form-check-input">
                    <label for="rj" class="form-check-label">Rio de Janeiro</label>
                </div>
                <!-- mg-->
                 <div class="form-check form-check-inline">
                    <input type="radio" name="tipo" id="mg" class="form-check-input">
                    <label for="mg" class="form-check-label">Minas Gerais</label>
                </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Enviar</button>
                <button type="reset" class="btn btn-warning">Limpar</button>
                <button type="button" class="btn btn-danger">Cancelar</button>
            </div>
        </form>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
